services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rounds
      POSTGRES_PASSWORD: rounds_dev
      POSTGRES_DB: rounds_monitor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rounds -d rounds_monitor"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://rounds:rounds_dev@db:5432/rounds_monitor
      STORAGE_TYPE: local
      SCREENSHOT_DIR: /app/screenshots
      NODE_ENV: development
    volumes:
      - screenshots:/app/screenshots
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:3001/api
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  pgdata:
  screenshots:
